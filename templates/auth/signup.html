{% extends 'base.html' %}

{% block title %}Sign Up | Lumos Career{% endblock %}

{% block content %}
<div class="form-container" style="margin-top: 60px;">
    <h2 style="font-weight: 700; margin-bottom: 30px;">Create an Account</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign Up</button>
    </form>
    <p style="margin-top: 20px;">Already have an account? <a href="{% url 'login' %}">Log In</a></p>
</div>
{% endblock %}
